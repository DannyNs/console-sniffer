name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: self-hosted

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Verify SNAPSHOT version
      run: |
        POM_VERSION=$(grep -m1 '<version>' pom.xml | sed 's/.*<version>\(.*\)<\/version>.*/\1/')
        echo "pom.xml version: $POM_VERSION"

        if [[ "$POM_VERSION" != *-SNAPSHOT ]]; then
          echo "::error::pom.xml version ($POM_VERSION) must contain -SNAPSHOT suffix on main branch."
          exit 1
        fi

        BASE_VERSION="${POM_VERSION%-SNAPSHOT}"
        LATEST_TAG=$(git tag -l 'v*' | sort -V | tail -1)

        if [ -n "$LATEST_TAG" ]; then
          LATEST_VERSION="${LATEST_TAG#v}"
          echo "Latest release tag: $LATEST_TAG (version: $LATEST_VERSION)"
          HIGHEST=$(printf '%s\n%s' "$BASE_VERSION" "$LATEST_VERSION" | sort -V | tail -1)
          if [ "$HIGHEST" = "$LATEST_VERSION" ]; then
            echo "::error::SNAPSHOT base version ($BASE_VERSION) must be higher than latest release ($LATEST_VERSION)."
            exit 1
          fi
          echo "Version check passed: $BASE_VERSION > $LATEST_VERSION"
        else
          echo "No release tags found, skipping version comparison."
        fi

        # On pull requests, verify version was bumped compared to the base branch
        if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
          BASE_BRANCH="${GITHUB_BASE_REF}"
          BASE_POM_VERSION=$(git show "origin/${BASE_BRANCH}:pom.xml" | grep -m1 '<version>' | sed 's/.*<version>\(.*\)<\/version>.*/\1/')
          echo "Base branch ($BASE_BRANCH) version: $BASE_POM_VERSION"
          if [ "$POM_VERSION" = "$BASE_POM_VERSION" ]; then
            echo "::error::pom.xml version ($POM_VERSION) must be updated compared to base branch ($BASE_BRANCH). Bump the version before merging."
            exit 1
          fi
          echo "Version bump check passed: $POM_VERSION != $BASE_POM_VERSION"
        fi

    - name: Build with Maven
      run: mvn -B package --file pom.xml
